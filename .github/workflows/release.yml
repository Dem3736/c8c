name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine channel
        id: channel
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-beta"* || "$TAG" == *"-alpha"* || "$TAG" == *"-rc"* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release
        env:
          C8C_BUILD_FLAVOR: release
          C8C_RELEASE_CHANNEL: ${{ steps.channel.outputs.channel }}
          C8C_TELEMETRY_PROVIDER: posthog
          C8C_POSTHOG_HOST: ${{ secrets.C8C_POSTHOG_HOST }}
          C8C_POSTHOG_KEY: ${{ secrets.C8C_POSTHOG_KEY }}
        run: |
          if [ -z "$C8C_POSTHOG_HOST" ] || [ -z "$C8C_POSTHOG_KEY" ]; then
            echo "::warning::C8C_POSTHOG_HOST or C8C_POSTHOG_KEY is empty — telemetry will be disabled in this build"
          fi
          npm run build:shared
          npm run build

      - name: Package (macOS arm64, unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --arm64 --publish never

      - name: Generate checksums
        run: |
          cd release
          shasum -a 256 *.dmg *.zip 2>/dev/null > SHA256SUMS || true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/*.yml
            release/SHA256SUMS

