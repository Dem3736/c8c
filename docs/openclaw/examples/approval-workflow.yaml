version: 1
name: OpenClaw Approval Example
defaults:
  provider: claude
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 0
    config: {}
  - id: approval-1
    type: approval
    position:
      x: 220
      y: 0
    config:
      message: Approve publishing these changes?
      show_content: true
      allow_edit: true
  - id: output-1
    type: output
    position:
      x: 440
      y: 0
    config: {}
edges:
  - id: edge-1
    source: input-1
    target: approval-1
    type: default
  - id: edge-2
    source: approval-1
    target: output-1
    type: default
