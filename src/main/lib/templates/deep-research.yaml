id: deep-research
category: research
tags:
  - research
  - planning
  - kac
  - fan-out
  - parallel
  - synthesis
version: 1
name: Deep Research
description: Plan a topic via multi-angle decomposition and KAC, investigate each aspect in parallel, synthesize into a
  comprehensive report
defaults:
  model: sonnet
  maxTurns: 60
  timeout_minutes: 30
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: decomposition-1
    type: skill
    position:
      x: 250
      y: 200
    config:
      skillRef: researcher
      prompt: "Create a decomposition plan for this topic from different lenses before research starts. Return ONLY a JSON
        array where each aspect has: name, lens, key_question, why_it_matters, priority (high|medium), and query_seeds
        (3-4 concrete search queries). Cover 4-6 distinct lenses and avoid overlap. In the same output, include Key
        Assumptions Check (KAC): add 1-2 high-priority assumption-check aspects that explicitly try to disprove critical
        hidden assumptions."
  - id: splitter-1
    type: splitter
    position:
      x: 650
      y: 200
    config:
      strategy: Input is a prepared JSON array of research aspects (including KAC checks). Create one branch per aspect and
        preserve the full object details in each branch so the downstream researcher has complete context.
      maxBranches: 8
  - id: researcher-1
    type: skill
    position:
      x: 950
      y: 200
    config:
      skillRef: researcher
      prompt: Research this aspect thoroughly. Find credible sources, key data points, expert opinions, and emerging trends.
        Prioritize primary sources and recent publications. For KAC/assumption-check aspects, prioritize disconfirming
        evidence, failure cases, and counter-examples.
  - id: merger-1
    type: merger
    position:
      x: 1250
      y: 200
    config:
      strategy: summarize
      prompt: Synthesize all research findings into a comprehensive, well-structured report. Include an executive summary, key
        findings per aspect, KAC outcomes (which assumptions held or failed), cross-cutting themes, and actionable
        conclusions.
  - id: output-1
    type: output
    position:
      x: 1500
      y: 200
    config: {}
edges:
  - id: e-input-decomposition
    source: input-1
    target: decomposition-1
    type: default
  - id: e-decomposition-splitter
    source: decomposition-1
    target: splitter-1
    type: default
  - id: e-splitter-researcher
    source: splitter-1
    target: researcher-1
    type: default
  - id: e-researcher-merger
    source: researcher-1
    target: merger-1
    type: default
  - id: e-merger-output
    source: merger-1
    target: output-1
    type: default
