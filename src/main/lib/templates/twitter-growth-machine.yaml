id: twitter-growth-machine
stage: outreach
emoji: "\U0001F426"
headline: Generate algorithm-optimized tweets from trending topics
how: Researches trending topics, generates multiple tweet angles, optimizes each for algorithm, selects the best, and evaluates quality
input: A niche, brand voice, or topic area
output: Optimized tweet batch ready to post
steps:
  - Research trending topics in your niche
  - Generate multiple tweet angles in parallel
  - Optimize each for the algorithm and select the best
version: 1
name: Twitter Growth Machine
description: Research trending topics, generate multiple tweet angles, optimize each for algorithm, select the best,
  evaluate quality
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 30
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: researcher-1
    type: skill
    position:
      x: 300
      y: 200
    config:
      skillRef: product/Trend Researcher
      prompt: Research trending topics and conversations in this industry/niche. Find emerging themes, viral angles, and
        engagement patterns. Focus on what's resonating right now.
  - id: splitter-1
    type: splitter
    position:
      x: 600
      y: 200
    config:
      strategy: "Generate 5 distinct tweet/thread ideas based on the trending topics. Each should take a different angle:
        contrarian take, how-to, story, data insight, hot take."
  - id: optimizer-1
    type: skill
    position:
      x: 900
      y: 200
    config:
      skillRef: composio/twitter-algorithm-optimizer
      prompt: Optimize this tweet/thread for maximum reach using Twitter's algorithm. Improve hook, structure, engagement
        triggers, and formatting.
  - id: merger-1
    type: merger
    position:
      x: 1200
      y: 200
    config:
      strategy: select_best
      prompt: "Pick the single best tweet/thread based on: viral potential, authenticity, engagement likelihood, and alignment
        with the author's niche."
  - id: evaluator-1
    type: evaluator
    position:
      x: 1500
      y: 200
    config:
      criteria: "Score 1-10: hook strength (stops scrolling?), algorithm optimization (structure, length, formatting),
        authenticity (not generic AI slop), and engagement potential."
      threshold: 8
      maxRetries: 2
      retryFrom: researcher-1
  - id: output-1
    type: output
    position:
      x: 1800
      y: 200
    config: {}
edges:
  - id: e-input-researcher
    source: input-1
    target: researcher-1
    type: default
  - id: e-researcher-splitter
    source: researcher-1
    target: splitter-1
    type: default
  - id: e-splitter-optimizer
    source: splitter-1
    target: optimizer-1
    type: default
  - id: e-optimizer-merger
    source: optimizer-1
    target: merger-1
    type: default
  - id: e-merger-evaluator
    source: merger-1
    target: evaluator-1
    type: default
  - id: e-evaluator-output
    source: evaluator-1
    target: output-1
    type: pass
  - id: e-evaluator-researcher
    source: evaluator-1
    target: researcher-1
    type: fail
