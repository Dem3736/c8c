id: content-post-calendar
stage: content
emoji: "\U0001F5D3"
headline: Turn a trend digest into a concrete post calendar
how: Convert current signals into a short, usable post plan so drafting can start immediately.
input: Trend digest, channel constraints, and publishing intent
output: Post calendar with concrete slots ready for drafting
use_when: You already have a trend digest and want a concrete post plan before writing the actual posts.
steps:
  - Turn the trend digest into a small, concrete post calendar
  - Make each planned slot specific enough for downstream drafting
  - Evaluate for coverage, cadence, and non-repetitive angles before output
pack:
  id: content-factory-alpha
  label: Content Factory
  journey_stage: plan
  recommended_next:
    - content-ready-posts
contract_in:
  - kind: trend_digest
    title: Trend Digest
    description: Current themes, signals, and emerging angles worth turning into a post plan.
    required: true
contract_out:
  - kind: editorial_calendar
    title: Post Calendar
    description: Concrete post slots ready for drafting.
execution_policy:
  profile_id: content_post_calendar
  summary: Plan before drafting
  description: Turn signals into a concrete short-run content plan before generating the actual posts.
  tags:
    - evidence_first
    - consistency_checks
    - channel_aware
  notes:
    - Keep the plan short, concrete, and ready to execute.
    - Avoid repetitive hooks and overlapping angles.
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
version: 1
name: "Content Factory: Post Calendar"
description: Turn a trend digest into a concrete post calendar that can feed directly into post drafting.
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 25
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config:
      inputType: text
      required: true
      placeholder: Paste the trend digest plus channel, volume, and any publishing constraints.
  - id: planner-1
    type: skill
    position:
      x: 320
      y: 200
    config:
      skillRef: strategist
      prompt: >-
        Create a Post Calendar from the trend digest. For each planned post include:
        1) slot or sequence,
        2) topic,
        3) angle or hook,
        4) why it matters now,
        5) any channel nuance.
        Keep it concrete enough that each item can be drafted immediately.
  - id: eval-1
    type: evaluator
    position:
      x: 640
      y: 200
    config:
      criteria: "Score 1-10: post slots are concrete and distinct, angles are timely, sequence is realistic, no repetitive clustering."
      threshold: 7
      maxRetries: 2
      retryFrom: planner-1
  - id: output-1
    type: output
    position:
      x: 960
      y: 200
    config:
      title: Post Calendar
edges:
  - id: e-input-planner
    source: input-1
    target: planner-1
    type: default
  - id: e-planner-eval
    source: planner-1
    target: eval-1
    type: default
  - id: e-eval-output
    source: eval-1
    target: output-1
    type: pass
  - id: e-eval-retry
    source: eval-1
    target: planner-1
    type: fail
