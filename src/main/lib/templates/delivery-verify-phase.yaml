id: delivery-verify-phase
stage: operations
emoji: "\U0001F9EA"
headline: Verify a finished change before sign-off
how: Run automated checks first, then compare the implemented outcome against the plan in a verification report, evaluate report quality, and require explicit human approval before completion.
input: Implementation notes, evidence, or links that should be checked against the plan
output: Approved verification report with findings, gaps, and completion decision
use_when: A change has been implemented and you want a visible verification pass before declaring it complete.
time: ~5-8 min.
steps:
  - Run automated checks (tests, types, lint) and report raw results
  - Compare delivered work against the change plan and validation contract
  - Evaluate verification report quality and evidence
  - Require explicit founder review before finalizing
pack:
  id: delivery-foundation
  label: Delivery Lab
  journey_stage: verify
contract_in:
  - kind: phase_plan
    title: Change Plan
    description: The agreed objective, slices, and scope for the change.
    required: true
  - kind: review_notes
    title: Review Notes
    description: Optional review findings and follow-ups gathered before final verification.
    required: false
  - kind: validation_contract
    title: Validation Contract
    description: The checks and acceptance criteria that define completion.
    required: true
  - kind: research_pack
    title: Research Pack
    description: Helpful evidence and risks that verification should keep in view.
    required: false
contract_out:
  - kind: verification_report
    title: Verification Report
    description: Approved summary of what passed, what failed, and whether the change is ready to close.
execution_policy:
  profile_id: delivery_verify
  summary: Review-backed verification
  description: Compare the work against its contract, then require explicit human signoff before completion.
  tags:
    - test_first
    - review_gates
    - human_gate_required
  notes:
    - Verification should name gaps, not just celebrate completion.
    - The final report is only complete after human review.
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
version: 1
name: "Delivery Lab: Verify the Change"
description: Check the delivered outcome against the plan and validation contract, then finalize an approved verification report.
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 30
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config:
      inputType: text
      required: true
      placeholder: Paste implementation notes, test evidence, or review context for the change you want verified.
  - id: checker-1
    type: skill
    position:
      x: 320
      y: 200
    config:
      skillRef: researcher
      prompt: >-
        Run available automated checks (test suite, type check, lint) and report results as structured facts.
        Do not interpret — just report what passed, what failed, and what was skipped.
  - id: verifier-1
    type: skill
    position:
      x: 640
      y: 200
    config:
      skillRef: researcher
      prompt: >-
        Create a Verification Report for this delivery change. Compare the available implementation evidence
        against the Change Plan, Validation Contract, and any attached Review Notes. Include:
        1) what was verified,
        2) checks that appear to pass,
        3) gaps or failures,
        4) unresolved risks,
        5) recommended disposition: ready to close, needs follow-up, or blocked.
        Keep the report concise, explicit, and reviewable.
  - id: eval-1
    type: evaluator
    position:
      x: 960
      y: 200
    config:
      criteria: "Score 1-10: report references concrete test results not just text claims, all verification criteria addressed, issues prioritized by severity."
      threshold: 7
      maxRetries: 2
      retryFrom: verifier-1
  - id: approval-1
    type: approval
    position:
      x: 1280
      y: 200
    config:
      message: Approve the verification report before this change is marked ready to close.
      show_content: true
      allow_edit: true
      timeout_minutes: 120
      timeout_action: auto_reject
  - id: output-1
    type: output
    position:
      x: 1600
      y: 200
    config:
      title: Verification Report
edges:
  - id: e-input-checker
    source: input-1
    target: checker-1
    type: default
  - id: e-checker-verifier
    source: checker-1
    target: verifier-1
    type: default
  - id: e-verifier-eval
    source: verifier-1
    target: eval-1
    type: default
  - id: e-eval-approval
    source: eval-1
    target: approval-1
    type: pass
  - id: e-eval-retry
    source: eval-1
    target: verifier-1
    type: fail
  - id: e-approval-output
    source: approval-1
    target: output-1
    type: default
