id: content-draft-post
stage: content
emoji: "\U0000270D"
headline: Draft a channel-ready post from the editorial calendar
how: Turn one calendar slot into a strong post draft using the intended tone of voice, anti-slop rules, and channel constraints.
input: Editorial calendar slot, trend context, and tone-of-voice rules
output: Post draft ready for quality review
use_when: You want to draft a specific content item with the right voice and without generic AI filler.
time: ~5-8 min.
steps:
  - Use the selected calendar slot and trend context to draft one post
  - Respect tone of voice, no-slop constraints, and channel format requirements
  - Evaluate draft quality for AI slop words, channel fit, tone consistency, and specificity before output
pack:
  id: content-factory-alpha
  label: Content Lab
  journey_stage: execute
  recommended_next:
    - content-qa-review
contract_in:
  - kind: editorial_calendar
    title: Editorial Calendar
    description: The planned slot or publishing plan that should drive this draft.
    required: true
  - kind: trend_digest
    title: Trend Digest
    description: Optional trend evidence that keeps the draft grounded in the campaign context.
    required: false
contract_out:
  - kind: draft
    title: Draft Post
    description: First full post draft produced from the selected calendar slot.
execution_policy:
  profile_id: content_draft_post
  summary: Voice-locked drafting
  description: Draft from the planned slot while keeping tone, clarity, and anti-slop constraints explicit.
  tags:
    - voice_locked
    - no_slop
    - consistency_checks
  notes:
    - Default to concrete claims over generic setup.
    - Keep the final copy close to the selected slot and trend context.
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
version: 1
name: "Content Lab: Draft Post"
description: Turn a calendar slot into a channel-ready post draft with explicit voice and anti-slop constraints.
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 25
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config:
      inputType: text
      required: true
      placeholder: Paste the target calendar slot, tone rules, and any extra context needed for this post.
  - id: drafter-1
    type: skill
    position:
      x: 320
      y: 200
    config:
      skillRef: writer
      prompt: >-
        Draft one post from the provided calendar slot and campaign context.
        Requirements:
        1) stay inside the requested tone of voice,
        2) avoid generic AI phrasing or filler,
        3) make the hook and thesis concrete,
        4) keep the post channel-aware,
        5) surface specifics instead of buzzwords.
        Output only the draft plus a short note on what angle it is taking.
  - id: eval-1
    type: evaluator
    position:
      x: 640
      y: 200
    config:
      criteria: "Score 1-10: no AI slop words (delve, tapestry, landscape, leverage, elevate, streamline, utilize, synergy), channel-appropriate length, tone consistent with brief, concrete specifics not abstract claims."
      threshold: 7
      maxRetries: 2
      retryFrom: drafter-1
  - id: output-1
    type: output
    position:
      x: 960
      y: 200
    config:
      title: Draft Post
edges:
  - id: e-input-drafter
    source: input-1
    target: drafter-1
    type: default
  - id: e-drafter-eval
    source: drafter-1
    target: eval-1
    type: default
  - id: e-eval-output
    source: eval-1
    target: output-1
    type: pass
  - id: e-eval-retry
    source: eval-1
    target: drafter-1
    type: fail
