id: meeting-actions-plan
stage: operations
emoji: "\U0001F4CB"
headline: Turn meeting transcripts into action plans
how: Analyzes meeting transcript, extracts action items, prioritizes and plans each, and compiles into a project document
input: A meeting transcript or recording notes
output: Structured action plan with owners, priorities, and deadlines
use_when: You just finished a meeting and need owners, priorities, and deadlines while it is still fresh.
time: ~5-8 min.
steps:
  - Analyze meeting transcript and extract action items
  - Prioritize and plan each action item in parallel
  - Compile into a project planning document
  - Evaluate completeness, deduplication, and owner assignment quality
version: 1
name: Meeting → Actions → Plan
description: Analyze meeting transcript, extract action items, prioritize and plan each, compile into a project document
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 30
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: analyzer-1
    type: skill
    position:
      x: 300
      y: 200
    config:
      skillRef: composio/meeting-insights-analyzer
      prompt: Analyze this meeting transcript. Identify key decisions, action items, unresolved questions, and behavioral
        patterns.
  - id: summarizer-1
    type: skill
    position:
      x: 600
      y: 200
    config:
      skillRef: support/Executive Summary Generator
      prompt: "Create a concise executive summary of the meeting: key outcomes, decisions made, and strategic implications."
  - id: splitter-1
    type: splitter
    position:
      x: 900
      y: 200
    config:
      strategy: Extract each distinct action item as a separate task to be prioritized and planned.
  - id: pm-1
    type: skill
    position:
      x: 1200
      y: 200
    config:
      skillRef: project-management/Senior Project Manager
      prompt: "For this action item: estimate effort, assign priority (P0-P3), determine if task is for founder personally or can be delegated to AI agent/automation, define
        acceptance criteria, and set a deadline."
  - id: merger-1
    type: merger
    position:
      x: 1500
      y: 200
    config:
      strategy: concatenate
      prompt: Compile all action items into a structured project plan. Sort by priority, group by owner, include timeline.
  - id: eval-1
    type: evaluator
    position:
      x: 1820
      y: 200
    config:
      criteria: "Score 1-10: all action items from transcript captured, no duplicates, each has deadline and priority, owner assignment distinguishes founder-personal tasks from AI-delegatable tasks."
      threshold: 7
      maxRetries: 2
      retryFrom: analyzer-1
  - id: docx-1
    type: skill
    position:
      x: 2140
      y: 200
    config:
      skillRef: anthropic/docx
      prompt: "Create a professional meeting summary document with: executive summary, decisions log, prioritized action plan
        table, and next steps."
  - id: output-1
    type: output
    position:
      x: 2460
      y: 200
    config: {}
edges:
  - id: e-input-analyzer
    source: input-1
    target: analyzer-1
    type: default
  - id: e-analyzer-summarizer
    source: analyzer-1
    target: summarizer-1
    type: default
  - id: e-summarizer-splitter
    source: summarizer-1
    target: splitter-1
    type: default
  - id: e-splitter-pm
    source: splitter-1
    target: pm-1
    type: default
  - id: e-pm-merger
    source: pm-1
    target: merger-1
    type: default
  - id: e-merger-eval
    source: merger-1
    target: eval-1
    type: default
  - id: e-eval-docx
    source: eval-1
    target: docx-1
    type: pass
  - id: e-eval-retry
    source: eval-1
    target: analyzer-1
    type: fail
  - id: e-docx-output
    source: docx-1
    target: output-1
    type: default
execution_policy:
  profile_id: solo-founder
  summary: Optimized for solo founders using AI agents
  notes:
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
