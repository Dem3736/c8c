id: design-code-test
category: code
tags:
  - design
  - frontend
  - testing
  - quality-gate
version: 1
name: Design → Code → Test
description: Generate frontend component, review code quality, gate on standards, write tests, gate on coverage
defaults:
  model: sonnet
  maxTurns: 60
  timeout_minutes: 30
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: designer-1
    type: skill
    position:
      x: 300
      y: 200
    config:
      skillRef: anthropic/frontend-design
      prompt: Create a production-ready frontend component from this description. Use React, Tailwind CSS, and modern
        patterns. Focus on visual quality, accessibility, and responsiveness.
  - id: reviewer-1
    type: skill
    position:
      x: 600
      y: 200
    config:
      skillRef: dev/code-reviewer
      prompt: "Review this component for: code quality, accessibility issues, performance concerns, naming conventions, and
        React best practices. Provide specific fix suggestions."
  - id: eval-code-1
    type: evaluator
    position:
      x: 900
      y: 200
    config:
      criteria: "Score 1-10: code quality (clean, idiomatic React), visual design (polished, not generic), accessibility
        (ARIA, keyboard nav), and responsiveness."
      threshold: 8
      maxRetries: 2
      retryFrom: designer-1
  - id: tester-1
    type: skill
    position:
      x: 1200
      y: 200
    config:
      skillRef: anthropic/webapp-testing
      prompt: "Write and run Playwright tests for this component. Cover: rendering, user interactions, responsive behavior,
        and edge cases."
  - id: eval-test-1
    type: evaluator
    position:
      x: 1500
      y: 200
    config:
      criteria: "Score 1-10: test coverage (all user paths?), test reliability (no flaky assertions?), edge case coverage, and
        assertion quality."
      threshold: 7
      maxRetries: 2
      retryFrom: designer-1
  - id: output-1
    type: output
    position:
      x: 1800
      y: 200
    config: {}
edges:
  - id: e-input-designer
    source: input-1
    target: designer-1
    type: default
  - id: e-designer-reviewer
    source: designer-1
    target: reviewer-1
    type: default
  - id: e-reviewer-evalcode
    source: reviewer-1
    target: eval-code-1
    type: default
  - id: e-evalcode-tester
    source: eval-code-1
    target: tester-1
    type: pass
  - id: e-evalcode-designer
    source: eval-code-1
    target: designer-1
    type: fail
  - id: e-tester-evaltest
    source: tester-1
    target: eval-test-1
    type: default
  - id: e-evaltest-output
    source: eval-test-1
    target: output-1
    type: pass
  - id: e-evaltest-designer
    source: eval-test-1
    target: designer-1
    type: fail
