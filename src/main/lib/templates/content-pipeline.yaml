id: content-pipeline
stage: content
emoji: "\U0001F4F0"
headline: Turn strategy into marketing outputs
how: Builds the strategy, turns it into a report, then drafts the first marketing outputs from it.
input: Product or feature brief
output: Strategy report plus marketing results (positioning, messaging, content ideas)
use_when: You have the product strategy and need the first set of marketing outputs from it.
time: ~10-15 min.
steps:
  - Develop product strategy and positioning
  - Founder approves the strategy before downstream results are generated
  - Generate comprehensive strategy report
  - Create marketing results from the strategy
  - Evaluate quality and iterate if needed
execution_policy:
  notes:
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
version: 1
name: Content Pipeline
description: Develop product strategy, generate a structured report, create marketing results, and evaluate quality
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 30
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: strategist-1
    type: skill
    position:
      x: 300
      y: 200
    config:
      skillRef: strategist
      prompt: "Develop a product strategy based on the input. Cover: positioning, key differentiators, target audience
        messaging, feature prioritization, and go-to-market approach."
  - id: approval-1
    type: approval
    position:
      x: 620
      y: 200
    config:
      show_content: true
      allow_edit: true
      timeout_minutes: 180
      timeout_action: auto_reject
  - id: report-1
    type: skill
    position:
      x: 940
      y: 200
    config:
      skillRef: report-generator
      prompt: "Generate a comprehensive report synthesizing the strategy. Include: executive summary, market analysis,
        strategic recommendations, implementation roadmap, and risk assessment."
  - id: marketing-1
    type: skill
    position:
      x: 1260
      y: 200
    config:
      skillRef: marketing-generator
      prompt: "Create marketing outputs from the strategy and report: positioning statements, value propositions, messaging
        framework for each target segment, and content ideas matrix."
  - id: evaluator-1
    type: evaluator
    position:
      x: 1580
      y: 200
    config:
      criteria: "Score 1-10 on: strategic coherence (does everything align?), market grounding (based on real data?),
        actionability (clear next steps?), completeness (no major gaps?)"
      threshold: 7
      maxRetries: 2
      retryFrom: strategist-1
  - id: output-1
    type: output
    position:
      x: 1900
      y: 200
    config: {}
edges:
  - id: e-input-strategist
    source: input-1
    target: strategist-1
    type: default
  - id: e-strategist-approval
    source: strategist-1
    target: approval-1
    type: default
  - id: e-approval-report
    source: approval-1
    target: report-1
    type: default
  - id: e-report-marketing
    source: report-1
    target: marketing-1
    type: default
  - id: e-marketing-evaluator
    source: marketing-1
    target: evaluator-1
    type: default
  - id: e-evaluator-output
    source: evaluator-1
    target: output-1
    type: pass
  - id: e-evaluator-strategist
    source: evaluator-1
    target: strategist-1
    type: fail
