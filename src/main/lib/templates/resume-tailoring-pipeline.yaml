id: resume-tailoring-pipeline
stage: outreach
emoji: "\U0001F4C4"
headline: Tailor your resume for any job posting
how: Extracts resume content, tailors for the target job, evaluates ATS compatibility and impact, and formats as professional document
input: Your resume and a target job posting
output: Tailored resume optimized for ATS and specific job requirements
steps:
  - Extract resume content from PDF
  - Tailor content for target job requirements
  - Evaluate ATS compatibility and impact
  - Format as professional document
version: 1
name: Resume Tailoring Pipeline
description: Extract resume from PDF, tailor for target job, evaluate ATS compatibility and impact, format as professional document
defaults:
  model: sonnet
  maxTurns: 60
  timeout_minutes: 30
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: pdf-1
    type: skill
    position:
      x: 300
      y: 200
    config:
      skillRef: anthropic/pdf
      prompt: "Extract the complete text content from this resume PDF. Preserve structure: contact info, summary, experience
        (with dates, roles, bullets), education, skills."
  - id: tailor-1
    type: skill
    position:
      x: 600
      y: 200
    config:
      skillRef: composio/tailored-resume-generator
      prompt: Tailor this resume for the target job posting. Rewrite bullets to highlight relevant experience, reorder
        sections for impact, add missing keywords, and optimize for ATS parsing.
  - id: evaluator-1
    type: evaluator
    position:
      x: 900
      y: 200
    config:
      criteria: "Score 1-10: keyword match with job description, ATS compatibility (parseable format, standard sections),
        impact of bullet points (quantified achievements), and honest representation (no fabrication)."
      threshold: 8
      maxRetries: 3
      retryFrom: tailor-1
  - id: docx-1
    type: skill
    position:
      x: 1200
      y: 200
    config:
      skillRef: anthropic/docx
      prompt: Format the tailored resume as a clean, professional .docx document. Use a modern but ATS-friendly layout with
        clear section headers.
  - id: output-1
    type: output
    position:
      x: 1500
      y: 200
    config: {}
edges:
  - id: e-input-pdf
    source: input-1
    target: pdf-1
    type: default
  - id: e-pdf-tailor
    source: pdf-1
    target: tailor-1
    type: default
  - id: e-tailor-evaluator
    source: tailor-1
    target: evaluator-1
    type: default
  - id: e-evaluator-docx
    source: evaluator-1
    target: docx-1
    type: pass
  - id: e-evaluator-tailor
    source: evaluator-1
    target: tailor-1
    type: fail
  - id: e-docx-output
    source: docx-1
    target: output-1
    type: default
