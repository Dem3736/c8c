id: indispensable-jtbd-pipeline
stage: strategy
emoji: "\U0001F48E"
headline: Turn raw product data into JTBD positioning
how: Extracts jobs, segments users, scores opportunities, distills strategy, sharpens positioning, and clarifies messaging
input: Product descriptions, user feedback, reviews, or support tickets
output: Focused JTBD strategy with positioning statements and rewritten messaging
steps:
  - Extract structured job stories from raw material
  - Map segments and score opportunities
  - Distill to core job, segment, and value delta
  - Founder approves the chosen segment and strategic focus before sharpening
  - Sharpen positioning and clarify messaging
execution_policy:
  notes:
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
version: 1
name: Indispensable JTBD Pipeline
description: Extract jobs from raw product data, segment users, score opportunities, distill to
  essence, sharpen positioning, and clarify messaging — with quality-gate evaluation loop
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 45
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: extract-jobs-1
    type: skill
    position:
      x: 250
      y: 200
    config:
      skillRef: indispensable/extract-jobs
      prompt: "Extract structured job stories from the provided material. Transform unstructured
        product descriptions, user feedback, reviews, or support tickets into JTBD-formatted
        stories. For each job identify: the trigger/context, the desired outcome, the functional
        and emotional dimensions, aha moments, and habit bridges. Output a structured list of
        job stories with hierarchy."
  - id: map-segments-1
    type: skill
    position:
      x: 500
      y: 200
    config:
      skillRef: indispensable/map-segments
      prompt: "Group the extracted job stories into user segments based on shared jobs, contexts,
        and triggers — not demographics. For each segment provide: a descriptive name, the primary
        and secondary jobs, shared context/triggers, estimated size and accessibility, and fatal
        flaw checks. Score each segment on opportunity potential."
  - id: score-1
    type: skill
    position:
      x: 750
      y: 200
    config:
      skillRef: indispensable/score
      prompt: "Score and rank the identified segments across 5 dimensions: job frequency, willingness
        to pay, accessibility, competitive gap, and strategic fit. Check each segment for fatal
        flaws (too small, no budget, unreachable, saturated). Apply the Toothbrush Test — would
        users need this daily? Produce a ranked list with clear #1 recommendation and reasoning."
  - id: distill-1
    type: skill
    position:
      x: 1000
      y: 200
    config:
      skillRef: indispensable/distill
      prompt: "Simplify the product strategy to its essence. From the scored segments and job stories,
        identify the ONE primary job, ONE key segment, and ONE value delta. Cut everything that
        doesn't serve this core. Output a clear, concise strategy statement that a team could
        align around in 30 seconds."
  - id: approval-1
    type: approval
    position:
      x: 1250
      y: 200
    config:
      show_content: true
      allow_edit: true
      timeout_minutes: 180
      timeout_action: auto_reject
  - id: sharpen-1
    type: skill
    position:
      x: 1500
      y: 200
    config:
      skillRef: indispensable/sharpen
      prompt: "Sharpen the distilled positioning. Replace vague language with specific, measurable
        claims tied to concrete jobs. Every word must earn its place. Remove generic phrases
        (powerful, seamless, innovative), add numbers where possible, and ensure the positioning
        clearly answers: who is this for, what job does it solve, and why is this better than
        alternatives."
  - id: clarify-1
    type: skill
    position:
      x: 1750
      y: 200
    config:
      skillRef: indispensable/clarify
      prompt: "Rewrite all product messaging through the JTBD lens. Follow the arc: user's context →
        their job → your solution → measurable outcome. Rewrite hero text, value propositions,
        and CTAs to speak to the user's job context instead of product features. Eliminate
        feature-speak, slop words, and manipulation patterns. Be concrete, human, and honest."
  - id: evaluator-1
    type: evaluator
    position:
      x: 2000
      y: 200
    config:
      criteria: "Evaluate the JTBD pipeline output across 6 dimensions (score 1-10 each):
        1) Job clarity — are jobs specific, observable, and solution-agnostic?
        2) Segment coherence — do segments share real context, not just demographics?
        3) Scoring rigor — are rankings evidence-based with fatal flaw checks?
        4) Strategic focus — is there a clear #1 job/segment/value, not a wish list?
        5) Positioning sharpness — specific, measurable, no generic fluff?
        6) Messaging quality — follows JTBD arc, no feature-speak or slop?
        Provide specific fix instructions for any dimension below 7."
      threshold: 7
      maxRetries: 2
      retryFrom: distill-1
  - id: output-1
    type: output
    position:
      x: 2250
      y: 200
    config: {}
edges:
  - id: e-input-extract-jobs
    source: input-1
    target: extract-jobs-1
    type: default
  - id: e-extract-jobs-map-segments
    source: extract-jobs-1
    target: map-segments-1
    type: default
  - id: e-map-segments-score
    source: map-segments-1
    target: score-1
    type: default
  - id: e-score-distill
    source: score-1
    target: distill-1
    type: default
  - id: e-distill-approval
    source: distill-1
    target: approval-1
    type: default
  - id: e-approval-sharpen
    source: approval-1
    target: sharpen-1
    type: default
  - id: e-sharpen-clarify
    source: sharpen-1
    target: clarify-1
    type: default
  - id: e-clarify-evaluator
    source: clarify-1
    target: evaluator-1
    type: default
  - id: e-evaluator-output
    source: evaluator-1
    target: output-1
    type: pass
  - id: e-evaluator-distill
    source: evaluator-1
    target: distill-1
    type: fail
