id: delivery-research-phase
stage: research
emoji: "\U0001F52C"
headline: Research the next change before implementation starts
how: Gather the evidence, constraints, and unknowns that should shape the next change before code begins.
input: A scoped change, feature, or decision that needs grounded research
output: Research pack with evidence, constraints, risks, and open questions for the next change
use_when: You already know roughly what should happen next and need evidence before locking the plan.
time: ~8-12 min.
steps:
  - Gather relevant evidence, constraints, known risks, and open questions for the next change
  - Tighten the research into a practical pack that downstream planning can use directly
pack:
  id: delivery-foundation
  label: Delivery Lab
  journey_stage: research
  recommended_next:
    - delivery-plan-phase
contract_in:
  - kind: project_brief
    title: Project Brief
    description: The shaped outcome and scope for the work.
    required: true
  - kind: requirements_spec
    title: Requirements Spec
    description: Helpful quality and scope constraints to research against.
    required: false
  - kind: roadmap
    title: Roadmap
    description: Useful milestone context for which change needs research now.
    required: false
  - kind: codebase_map
    title: Codebase Map
    description: Helpful technical context when the work targets an existing repository.
    required: false
contract_out:
  - kind: research_pack
    title: Research Pack
    description: Evidence, constraints, risks, open questions, and recommended focus for the next change.
execution_policy:
  profile_id: delivery_research
  summary: Evidence-first change research
  description: Research the next change before locking task breakdowns or implementation details.
  tags:
    - evidence_first
    - fresh_workers
  notes:
    - Separate observed evidence from assumptions.
    - Call out what still needs a human decision.
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
version: 1
name: "Delivery Lab: Research the Change"
description: Turn scoped delivery context into a research pack that can strengthen the next plan.
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 25
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config:
      inputType: text
      required: true
      placeholder: Paste the change, decision, or scoped feature you want researched before planning.
  - id: researcher-1
    type: skill
    position:
      x: 320
      y: 200
    config:
      skillRef: researcher
      prompt: >-
        Build a Research Pack for the next delivery change. Include:
        1) objective and scope,
        2) relevant evidence and constraints,
        3) known technical or product risks,
        4) dependencies and unknowns,
        5) questions that still need a decision,
        6) what the next change plan should optimize for.
        Keep the output practical and clearly labeled.
  - id: reviewer-1
    type: skill
    position:
      x: 640
      y: 200
    config:
      skillRef: researcher
      prompt: >-
        Review this research pack. Tighten vague claims, separate evidence from assumptions,
        and strengthen the open questions and decision points. Return the improved final research pack.
  - id: output-1
    type: output
    position:
      x: 960
      y: 200
    config:
      title: Research Pack
edges:
  - id: e-input-researcher
    source: input-1
    target: researcher-1
    type: default
  - id: e-researcher-reviewer
    source: researcher-1
    target: reviewer-1
    type: default
  - id: e-reviewer-output
    source: reviewer-1
    target: output-1
    type: default
