id: cto-product-spec
stage: strategy
emoji: "\U0001F4DD"
headline: Go from idea to CTO-grade product spec
how: Generates a comprehensive product specification from idea to modular implementation details with architecture decisions
input: A product idea or feature concept
output: Complete product spec with architecture, stack decisions, and implementation modules
steps:
  - Analyze the idea and define product requirements
  - Design system architecture and choose stack
  - Break down into implementation modules
  - Generate CTO-grade specification document
  - Evaluate internal consistency, scope realism, and technical justification
version: 1
name: CTO Product Spec
description: Generate a CTO-grade product specification from idea to modular implementation details
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 45
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: architect-1
    type: skill
    position:
      x: 300
      y: 200
    config:
      skillRef: cto/product-architect
      prompt: >-
        Act as a pragmatic CTO. From this product brief, build a foundation document with:

        1) **Stack recommendation** (frontend, backend, data, infra, observability, auth, integrations) with trade-offs
        and rationale.

        2) **Big product picture** (users, core journeys, major capabilities, system boundaries, service interactions,
        and non-functional priorities).

        3) **Product parts catalog** of 5-10 parts/modules. For each part include: part_id, purpose, owned
        responsibilities, key interfaces, dependencies, and expected outcomes.

        Use explicit section headers and keep assumptions visible.
  - id: splitter-1
    type: splitter
    position:
      x: 600
      y: 200
    config:
      strategy: Split the foundation document into one task per item in the Product Parts Catalog. Each task must include the
        chosen stack context and big-picture architecture context, then request a detailed spec for that single part.
      maxBranches: 8
  - id: part-spec-1
    type: skill
    position:
      x: 900
      y: 200
    config:
      skillRef: cto/part-spec-writer
      prompt: "Write a detailed technical spec for this product part. Include: objective, user stories, scope/non-scope,
        architecture role, APIs/events/contracts, data model, state/flow logic, security/privacy controls,
        performance/SLO expectations, telemetry/monitoring, test strategy, rollout/migration plan, risks, and open
        questions. Keep language implementation-ready."
  - id: merger-1
    type: merger
    position:
      x: 1200
      y: 200
    config:
      strategy: summarize
      prompt: |-
        Merge all part-level specs into one unified CTO document with sections:
        - Executive summary
        - Recommended stack and rationale
        - Big-picture product architecture
        - Cross-cutting standards (security, observability, reliability, DX)
        - Detailed specs by product part
        - Delivery phases and milestones
        - Risk register and open questions
        Deduplicate overlaps, resolve terminology conflicts, and keep the final document coherent.
  - id: eval-1
    type: evaluator
    position:
      x: 1520
      y: 200
    config:
      criteria: "Score 1-10: all spec parts are internally consistent, scope is realistic for stated constraints, no contradictions between modules, technical choices are justified not assumed."
      threshold: 7
      maxRetries: 2
      retryFrom: architect-1
  - id: output-1
    type: output
    position:
      x: 1840
      y: 200
    config: {}
edges:
  - id: e-input-architect
    source: input-1
    target: architect-1
    type: default
  - id: e-architect-splitter
    source: architect-1
    target: splitter-1
    type: default
  - id: e-splitter-partspec
    source: splitter-1
    target: part-spec-1
    type: default
  - id: e-partspec-merger
    source: part-spec-1
    target: merger-1
    type: default
  - id: e-merger-eval
    source: merger-1
    target: eval-1
    type: default
  - id: e-eval-output
    source: eval-1
    target: output-1
    type: pass
  - id: e-eval-retry
    source: eval-1
    target: architect-1
    type: fail
execution_policy:
  profile_id: solo-founder
  summary: Optimized for solo founders using AI agents
  notes:
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
