id: full-stack-code-audit
stage: code
emoji: "\U0001F6E1"
headline: Audit a codebase across security, quality, and architecture
how: Splits codebase into audit areas, reviews each, synthesizes findings, and creates an audit report
input: A codebase path or repository
output: Audit report covering security, quality, architecture, and test coverage
use_when: Your codebase grew and you are not sure where the real risks are.
time: ~10-15 min.
steps:
  - Split codebase into audit areas (security, quality, architecture, tests)
  - Review each area in parallel
  - Synthesize findings into a prioritized audit report
execution_policy:
  profile_id: solo_operator
  summary: Solo founder operational context
  notes:
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
version: 1
name: Full-Stack Code Audit
description: Split codebase into audit areas, review security/quality/architecture/tests, synthesize
  findings, create audit report
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 30
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: splitter-1
    type: splitter
    position:
      x: 300
      y: 200
    config:
      strategy: "Create 4 audit focus areas: Security (vulnerabilities, auth, input validation), Code Quality (patterns,
        naming, complexity), Architecture (structure, dependencies, scalability), Test Coverage (missing tests, quality
        of assertions)."
      maxBranches: 4
  - id: auditor-1
    type: skill
    position:
      x: 600
      y: 200
    config:
      skillRef: dev/code-reviewer
      prompt: Perform a deep audit of this codebase focused on the assigned area. Find specific issues with file paths and
        line numbers. Rate severity (critical/high/medium/low). Provide fix recommendations.
  - id: merger-1
    type: merger
    position:
      x: 900
      y: 200
    config:
      strategy: summarize
      prompt: Synthesize all audit findings into a comprehensive report. Organize by severity, include executive summary with
        overall health score, and prioritize remediation roadmap.
  - id: evaluator-1
    type: evaluator
    position:
      x: 1200
      y: 200
    config:
      criteria: "Score 1-10: finding specificity (exact file/line refs?), severity accuracy (proportional ratings?),
        remediation quality (actionable fixes?), and coverage breadth (all areas examined?)."
      threshold: 7
      maxRetries: 2
      retryFrom: splitter-1
  - id: approval-1
    type: approval
    position:
      x: 1500
      y: 200
    config:
      title: Review findings before recommendations
      description: Check the audit findings. Mark any false positives or known trade-offs before the system generates fix recommendations.
      timeout: 7200
      defaultAction: approve
  - id: report-1
    type: skill
    position:
      x: 1800
      y: 200
    config:
      prompt: "Output as structured markdown with clear sections, not a presentation. Include: overall health score, findings by category, top 10 critical issues,
        and remediation roadmap with estimated effort."
  - id: output-1
    type: output
    position:
      x: 2100
      y: 200
    config: {}
edges:
  - id: e-input-splitter
    source: input-1
    target: splitter-1
    type: default
  - id: e-splitter-auditor
    source: splitter-1
    target: auditor-1
    type: default
  - id: e-auditor-merger
    source: auditor-1
    target: merger-1
    type: default
  - id: e-merger-evaluator
    source: merger-1
    target: evaluator-1
    type: default
  - id: e-evaluator-approval
    source: evaluator-1
    target: approval-1
    type: pass
  - id: e-evaluator-splitter
    source: evaluator-1
    target: splitter-1
    type: fail
  - id: e-approval-report
    source: approval-1
    target: report-1
    type: default
  - id: e-report-output
    source: report-1
    target: output-1
    type: default
