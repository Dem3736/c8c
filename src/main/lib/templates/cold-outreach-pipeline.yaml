id: cold-outreach-pipeline
stage: outreach
emoji: "\U0001F4E7"
headline: Generate personalized cold emails that get replies
how: Builds company context, generates pain hypotheses, crafts templates, generates personalized emails, and simulates buyer response
input: Target company or prospect information
output: Personalized cold email sequences with buyer-response simulation
use_when: You have a prospect list and need emails that sound specific, not batch-blasted.
time: ~8-12 min.
steps:
  - Build company context and generate pain hypotheses
  - Craft email templates from pain points
  - Generate personalized emails and follow-up sequences
  - Simulate buyer response and evaluate email quality
  - Founder approves final outreach before sending
execution_policy:
  notes:
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
version: 1
name: Cold Outreach Pipeline
description: Build company context, generate pain hypotheses, craft email templates, generate personalized emails,
  simulate buyer response, evaluate quality
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 30
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config: {}
  - id: context-1
    type: skill
    position:
      x: 300
      y: 200
    config:
      skillRef: gtm/context-building
      prompt: "Build a complete company context: product info, ICP, value props, competitive advantages, proof points."
  - id: hypotheses-1
    type: skill
    position:
      x: 600
      y: 200
    config:
      skillRef: gtm/hypothesis-building
      prompt: Generate 5-8 testable pain hypotheses from the company context. Focus on specific, provable pains the ICP faces.
  - id: email-prompt-1
    type: skill
    position:
      x: 900
      y: 200
    config:
      skillRef: gtm/email-prompt-building
      prompt: Create a self-contained email prompt template for cold outreach. Include voice rules, personalization tokens,
        and campaign angle.
  - id: email-gen-1
    type: skill
    position:
      x: 1200
      y: 200
    config:
      skillRef: gtm/email-generation
      prompt: Generate 5 personalized cold emails using the template. Each should feel hand-written, not templated.
  - id: followup-1
    type: skill
    position:
      x: 1520
      y: 200
    config:
      skillRef: gtm/email-generation
      prompt: >-
        For each generated email, write a 3-step follow-up sequence:
        - Follow-up 1 (Day 3): Short, adds new value angle, no guilt-tripping.
        - Follow-up 2 (Day 7): Different medium or angle, references specific pain point.
        - Follow-up 3 (Day 14): Breakup email, graceful close, leaves door open.
        Rules: Each follow-up must stand alone (recipient may not have read previous).
        No "just following up" or "bumping this". Each adds new information or angle.
  - id: simulator-1
    type: skill
    position:
      x: 1840
      y: 200
    config:
      skillRef: gtm/email-response-simulation
      prompt: Simulate a skeptical buyer reading each email. Score reply likelihood, identify objections, suggest improvements.
  - id: evaluator-1
    type: evaluator
    position:
      x: 2160
      y: 200
    config:
      criteria: "Score 1-10: personalization depth (not just name-swaps), pain relevance (does it hit real problems?), CTA
        clarity, and spam-filter safety."
      threshold: 7
      maxRetries: 2
      retryFrom: email-prompt-1
  - id: approval-1
    type: approval
    position:
      x: 2480
      y: 200
    config:
      show_content: true
      allow_edit: true
      timeout_minutes: 180
      timeout_action: auto_reject
  - id: output-1
    type: output
    position:
      x: 2800
      y: 200
    config: {}
edges:
  - id: e-input-context
    source: input-1
    target: context-1
    type: default
  - id: e-context-hypotheses
    source: context-1
    target: hypotheses-1
    type: default
  - id: e-hypotheses-emailprompt
    source: hypotheses-1
    target: email-prompt-1
    type: default
  - id: e-emailprompt-emailgen
    source: email-prompt-1
    target: email-gen-1
    type: default
  - id: e-emailgen-followup
    source: email-gen-1
    target: followup-1
    type: default
  - id: e-followup-simulator
    source: followup-1
    target: simulator-1
    type: default
  - id: e-simulator-evaluator
    source: simulator-1
    target: evaluator-1
    type: default
  - id: e-evaluator-approval
    source: evaluator-1
    target: approval-1
    type: pass
  - id: e-evaluator-emailprompt
    source: evaluator-1
    target: email-prompt-1
    type: fail
  - id: e-approval-output
    source: approval-1
    target: output-1
    type: default
