id: landing-audit-loop
stage: content
emoji: "\U0001F50D"
headline: Audit and rewrite a landing page
how: Analyze the landing page against the stated job-to-be-done, split into logical blocks for parallel rewriting, merge with consistency checks, and route through an approval step.
input: A landing page URL or copy text
output: Rewritten landing page copy with JTBD-aligned messaging
use_when: You have a landing page that feels weak and need a sharper version before sending traffic.
time: ~8-12 min.
steps:
  - Analyze landing page against JTBD framework
  - Split page into logical blocks for parallel rewriting
  - Rewrite each block using JTBD analysis as brief
  - Merge blocks with cross-block consistency checks
  - Evaluate JTBD alignment and copy quality
  - Founder approval before finalizing
  - Output rewritten landing page
version: 1
name: Landing Page Audit Loop
description: Analyze a landing page using JTBD framework, split into blocks for parallel rewriting, merge with consistency checks, and iterate until quality threshold met
defaults:
  model: sonnet
  maxTurns: 120
  timeout_minutes: 30
execution_policy:
  profile_id: landing_audit
  summary: Block-by-block JTBD rewrite
  description: Analyze landing page against customer job-to-be-done, rewrite blocks in parallel, merge with consistency checks, and require founder approval.
  tags:
    - evidence_first
  notes:
    - "Target operator: solo founder with AI agents, no employees. Filter recommendations by what one person can execute with AI tools within a week. Avoid team-dependent suggestions."
nodes:
  - id: input-1
    type: input
    position:
      x: 0
      y: 200
    config:
      inputType: text
      required: true
      placeholder: Paste your landing page content and describe the target customer job-to-be-done.
  - id: validator-1
    type: skill
    position:
      x: 320
      y: 200
    config:
      skillRef: researcher
      prompt: >-
        Analyze this landing page against the stated job-to-be-done (JTBD).
        For each section of the page, assess: Does it address the customer's actual job?
        Does it use their language? Does it provide evidence, not just claims?
        Output a JTBD alignment scorecard that the rewriter can use as a brief.
  - id: splitter-1
    type: splitter
    position:
      x: 640
      y: 200
    config:
      strategy: "Split the landing page into logical blocks for parallel rewriting: hero/headline, problem statement, solution description, evidence/social proof, pricing/CTA, and any other distinct sections. Each block gets the JTBD scorecard as context."
  - id: rewriter-1
    type: skill
    position:
      x: 960
      y: 200
    config:
      skillRef: marketing/Content Creator
      prompt: >-
        Rewrite this landing page block using the JTBD analysis as your brief.
        Rules: Use the customer's language, not marketing jargon. Lead with the outcome they want.
        Provide specific evidence. Every sentence must earn its place — cut filler.
        Keep the block self-contained but aware of its role in the full page flow.
  - id: merger-1
    type: merger
    position:
      x: 1280
      y: 200
    config:
      strategy: concatenate
      prompt: >-
        Assemble all rewritten blocks into a complete landing page.
        Check cross-block consistency: same voice, no repeated arguments, logical flow from problem to solution to proof to CTA.
        Flag any inconsistencies between blocks.
  - id: eval-1
    type: evaluator
    position:
      x: 1600
      y: 200
    config:
      criteria: "Score 1-10: JTBD alignment (does every block serve the customer's job?), no AI slop language, evidence-based claims not generic promises, clear singular CTA, consistent voice across blocks."
      threshold: 8
      maxRetries: 2
      retryFrom: splitter-1
  - id: approval-1
    type: approval
    position:
      x: 1920
      y: 200
    config:
      show_content: true
      allow_edit: true
      timeout_minutes: 180
      timeout_action: auto_reject
  - id: output-1
    type: output
    position:
      x: 2240
      y: 200
    config:
      title: Rewritten Landing Page
edges:
  - id: e-input-validator
    source: input-1
    target: validator-1
    type: default
  - id: e-validator-splitter
    source: validator-1
    target: splitter-1
    type: default
  - id: e-splitter-rewriter
    source: splitter-1
    target: rewriter-1
    type: default
  - id: e-rewriter-merger
    source: rewriter-1
    target: merger-1
    type: default
  - id: e-merger-eval
    source: merger-1
    target: eval-1
    type: default
  - id: e-eval-approval
    source: eval-1
    target: approval-1
    type: pass
  - id: e-eval-retry
    source: eval-1
    target: splitter-1
    type: fail
  - id: e-approval-output
    source: approval-1
    target: output-1
    type: default
